services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: researcher
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build: .
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [postgres, redis]

  worker:
    build: .
    command: ["celery", "-A", "worker.celery_app:celery_app", "worker", "--loglevel=INFO"]
    env_file: .env
    depends_on: [postgres, redis]

volumes:
  pgdata:
