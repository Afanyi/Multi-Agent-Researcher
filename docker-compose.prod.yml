services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: researcher
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always

  api:
    image: ghcr.io/${GITHUB_REPO:-afanyi/multi-agent-researcher}/api:latest
    restart: always
    environment:
      DATABASE_URL: postgresql+psycopg://app:${POSTGRES_PASSWORD}@postgres:5432/researcher
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SERPER_API_KEY: ${SERPER_API_KEY}
      DOMAIN_DEFAULT_ALLOWLIST: ${DOMAIN_DEFAULT_ALLOWLIST}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    image: ghcr.io/${GITHUB_REPO:-afanyi/multi-agent-researcher}/worker:latest
    restart: always
    command: ["celery", "-A", "worker.celery_app:celery_app", "worker", "--loglevel=INFO"]
    environment:
      DATABASE_URL: postgresql+psycopg://app:${POSTGRES_PASSWORD}@postgres:5432/researcher
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SERPER_API_KEY: ${SERPER_API_KEY}
      DOMAIN_DEFAULT_ALLOWLIST: ${DOMAIN_DEFAULT_ALLOWLIST}
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
